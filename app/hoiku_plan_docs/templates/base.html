<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}hoiku-plan-docs{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__inner">
        <a class="brand" href="/">
          <span class="brand__mark">H</span>
          <span>
            <span class="brand__name">hoiku-plan-docs</span>
            <span class="brand__sub">保育ICT ベータ</span>
          </span>
        </a>
        <nav class="top-nav" aria-label="メインナビゲーション">
          <a href="/documents/">帳票一覧</a>
          <a href="/annual-plans/new">年案作成</a>
          <a href="/monthly-plans/new">月案作成</a>
          <a href="/bunrei/monthly">文例選択</a>
        </nav>
        <div class="staff-chip">
          <span>{{ user.name }}</span>
          <strong>{{ user.role_label }}</strong>
          <a href="/staff/login">切替</a>
        </div>
      </div>
    </header>
    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
